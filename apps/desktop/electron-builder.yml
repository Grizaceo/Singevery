# Configuración de empaquetado con electron-builder.
# Foco: Windows NSIS (.exe). macOS/Linux se pueden añadir después.
appId: com.gris.singevery
productName: Singevery
copyright: Copyright © 2026 Gris

directories:
  output: release
  buildResources: build

# Incluye el sidecar SMTC compilado (native/smtc/dist) en los recursos de la
# app empaquetada; smtcPath.ts lo autodetecta bajo process.resourcesPath.
extraResources:
  - from: ../native/smtc/dist
    to: native/smtc/dist
    filter: ['**/*']

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/kuromoji/dict/**/*
  - '!**/.env*'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}'
  - '!**/node_modules/**/{*.map,*.ts,test.js,test.ts,test.d.ts}'

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Singevery
